<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Buddy Robot Controller</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #0f1318;
    --border: #1e2530;
    --accent: #00f5c4;
    --accent2: #0099ff;
    --danger: #ff4466;
    --text: #e0eaf5;
    --muted: #4a5568;
    --glow: 0 0 20px rgba(0,245,196,0.3);
    --glow2: 0 0 20px rgba(0,153,255,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .everything { position: relative; z-index: 1; width: 100%; max-width: 480px; }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 24px;
    animation: fadeDown 0.6s ease;
  }

  header h1 {
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 3px;
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .status-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .status-card .label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .status-card .value {
    font-size: 1.1rem;
    font-family: 'Orbitron', monospace;
    color: var(--accent);
  }

  .status-card.danger .value { color: var(--danger); }

  /* connection dot */
  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 6px;
    vertical-align: middle;
  }
  .conn-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.5s infinite; }
  .conn-dot.obstacle { background: var(--danger); box-shadow: 0 0 8px var(--danger); animation: pulse 0.5s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── D-PAD ── */
  .dpad-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .dpad-title {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: center;
  }

  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    grid-template-rows: repeat(3, 80px);
    gap: 8px;
    justify-content: center;
  }

  .btn {
    background: #141920;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s ease;
    position: relative;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: var(--glow);
    background: rgba(0,245,196,0.05);
  }

  .btn:active, .btn.pressed {
    transform: scale(0.92);
    background: rgba(0,245,196,0.12);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: var(--glow);
  }

  .btn-stop {
    background: rgba(255,68,102,0.08);
    border-color: rgba(255,68,102,0.3);
    color: var(--danger);
    font-size: 0.55rem;
    letter-spacing: 2px;
  }

  .btn-stop:hover, .btn-stop:active, .btn-stop.pressed {
    background: rgba(255,68,102,0.18);
    border-color: var(--danger);
    color: var(--danger);
    box-shadow: 0 0 20px rgba(255,68,102,0.3);
  }

  /* grid positions */
  .btn-forward  { grid-column: 2; grid-row: 1; }
  .btn-left     { grid-column: 1; grid-row: 2; }
  .btn-stop     { grid-column: 2; grid-row: 2; }
  .btn-right    { grid-column: 3; grid-row: 2; }
  .btn-backward { grid-column: 2; grid-row: 3; }

  /* ── CURRENT COMMAND ── */
  .cmd-display {
    text-align: center;
    margin-top: 16px;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .cmd-display span {
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
  }

  /* ── SPEED SLIDER ── */
  .speed-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 20px;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .speed-panel .label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
  }

  .speed-panel .label span {
    color: var(--accent2);
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
  }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right, var(--accent2) 0%, var(--accent2) var(--val, 80%), var(--border) var(--val, 80%));
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 10px var(--accent2);
    cursor: pointer;
  }

  /* ── LOG ── */
  .log-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    animation: fadeUp 0.6s ease 0.4s both;
  }

  .log-panel .label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .log-entries {
    height: 90px;
    overflow-y: auto;
    display: flex;
    flex-direction: column-reverse;
    gap: 3px;
  }

  .log-entries::-webkit-scrollbar { width: 3px; }
  .log-entries::-webkit-scrollbar-track { background: transparent; }
  .log-entries::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-entry {
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    gap: 10px;
  }

  .log-entry .time { color: #2d3748; flex-shrink: 0; }
  .log-entry.success .msg { color: var(--accent); }
  .log-entry.error .msg { color: var(--danger); }
  .log-entry.info .msg { color: var(--accent2); }

  /* ── KEYBOARD HINT ── */
  .kbd-hint {
    text-align: center;
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 16px;
    letter-spacing: 1px;
    animation: fadeUp 0.6s ease 0.5s both;
  }

  .kbd-hint kbd {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="everything">

  <!-- HEADER -->
  <header>
    <h1>BUDDY ROBOT</h1>
    <p>Firebase Remote Controller</p>
  </header>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-card" id="connCard">
      <div class="label">Status</div>
      <div class="value"><span class="conn-dot" id="connDot"></span><span id="connText">Connecting...</span></div>
    </div>
    <div class="status-card" id="distCard">
      <div class="label">Distance</div>
      <div class="value"><span id="distVal">--</span> <span style="font-size:0.7rem;color:var(--muted)">cm</span></div>
    </div>
    <div class="status-card">
      <div class="label">Command</div>
      <div class="value" id="cmdVal" style="font-size:0.75rem;letter-spacing:1px">--</div>
    </div>
  </div>

  <!-- D-PAD -->
  <div class="dpad-wrapper">
    <div class="dpad-title">Direction Control</div>
    <div class="dpad">
      <button class="btn btn-forward"  id="btn-forward"  onclick="sendCommand('forward')"  title="Forward">▲</button>
      <button class="btn btn-left"     id="btn-left"     onclick="sendCommand('left')"     title="Left">◀</button>
      <button class="btn btn-stop"     id="btn-stop"     onclick="sendCommand('stop')"     title="Stop">STOP</button>
      <button class="btn btn-right"    id="btn-right"    onclick="sendCommand('right')"    title="Right">▶</button>
      <button class="btn btn-backward" id="btn-backward" onclick="sendCommand('backward')" title="Backward">▼</button>
    </div>
    <div class="cmd-display">Last sent: <span id="lastCmd">--</span></div>
  </div>

  <!-- SPEED -->
  <div class="speed-panel">
    <div class="label">
      Speed Control
      <span id="speedVal">80%</span>
    </div>
    <input type="range" min="0" max="100" value="80" id="speedSlider" oninput="updateSpeed(this.value)"/>
  </div>

  <!-- LOG -->
  <div class="log-panel">
    <div class="label">Activity Log</div>
    <div class="log-entries" id="logEntries"></div>
  </div>

  <!-- KEYBOARD HINT -->
  <div class="kbd-hint">
    Keyboard: <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> <kbd>Space</kbd> = Stop
  </div>

</div>

<!-- Firebase v8 (compat) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // ════════════════════════════════════════
  //  🔥 FIREBASE CONFIG — update if needed
  // ════════════════════════════════════════
  const firebaseConfig = {
    apiKey:      "AIzaSyBcqUnut2CFJHTYND4a8QxA9CshwEHxl2A",
    databaseURL: "https://buddy-robot-control-penal-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:   "buddy-robot-control-penal"
  };

  firebase.initializeApp(firebaseConfig);
  const db      = firebase.database();
  const robotRef = db.ref('/robot');

  // ── SEND COMMAND ────────────────────────
  function sendCommand(cmd) {
    robotRef.child('command').set(cmd)
      .then(() => {
        document.getElementById('lastCmd').textContent = cmd.toUpperCase();
        document.getElementById('cmdVal').textContent  = cmd.toUpperCase();
        addLog('success', `→ ${cmd.toUpperCase()}`);
        flashBtn(cmd);
      })
      .catch(err => addLog('error', err.message));
  }

  // ── SPEED SLIDER ────────────────────────
  function updateSpeed(val) {
    document.getElementById('speedVal').textContent = val + '%';
    document.getElementById('speedSlider').style.setProperty('--val', val + '%');
    robotRef.child('speed').set(parseInt(val))
      .catch(() => {});
  }
  updateSpeed(80);

  // ── LISTEN TO FIREBASE ──────────────────
  robotRef.on('value', snap => {
    const data = snap.val();
    if (!data) return;

    // Distance
    const dist = data.distance ?? '--';
    document.getElementById('distVal').textContent = dist;
    const distCard = document.getElementById('distCard');
    distCard.className = (dist !== '--' && dist < 20 && dist > 0)
      ? 'status-card danger' : 'status-card';

    // Status
    const dot  = document.getElementById('connDot');
    const txt  = document.getElementById('connText');
    const status = data.status ?? 'offline';
    dot.className  = 'conn-dot ' + (status === 'obstacle' ? 'obstacle' : 'online');
    txt.textContent = status.toUpperCase();

    // Command
    if (data.command) {
      document.getElementById('cmdVal').textContent = data.command.toUpperCase();
    }
  });

  // connection state
  db.ref('.info/connected').on('value', snap => {
    const dot = document.getElementById('connDot');
    const txt = document.getElementById('connText');
    if (!snap.val()) {
      dot.className = 'conn-dot';
      txt.textContent = 'OFFLINE';
      addLog('error', 'Firebase disconnected');
    } else {
      addLog('info', 'Firebase connected');
    }
  });

  // ── LOG ─────────────────────────────────
  function addLog(type, msg) {
    const now  = new Date();
    const time = now.toTimeString().slice(0,8);
    const el   = document.createElement('div');
    el.className = 'log-entry ' + type;
    el.innerHTML = `<span class="time">${time}</span><span class="msg">${msg}</span>`;
    const log = document.getElementById('logEntries');
    log.prepend(el);
    if (log.children.length > 30) log.lastChild.remove();
  }

  // ── FLASH BUTTON ────────────────────────
  function flashBtn(cmd) {
    const map = { forward:'btn-forward', backward:'btn-backward', left:'btn-left', right:'btn-right', stop:'btn-stop' };
    const id  = map[cmd];
    if (!id) return;
    const el  = document.getElementById(id);
    if (!el)  return;
    el.classList.add('pressed');
    setTimeout(() => el.classList.remove('pressed'), 200);
  }

  // ── KEYBOARD CONTROL ────────────────────
  const keyMap = {
    ArrowUp:    'forward',
    ArrowDown:  'backward',
    ArrowLeft:  'left',
    ArrowRight: 'right',
    ' ':        'stop',
    'w':        'forward',
    's':        'backward',
    'a':        'left',
    'd':        'right',
  };

  let lastKey = null;

  document.addEventListener('keydown', e => {
    const cmd = keyMap[e.key];
    if (!cmd || lastKey === cmd) return;
    lastKey = cmd;
    sendCommand(cmd);
    e.preventDefault();
  });

  document.addEventListener('keyup', e => {
    const cmd = keyMap[e.key];
    if (!cmd) return;
    lastKey = null;
    sendCommand('stop');
  });
</script>
</body>
</html>
